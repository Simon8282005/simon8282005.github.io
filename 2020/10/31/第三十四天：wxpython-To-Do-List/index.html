  <div class="content" itemprop="articleBody">
    <p>续上一篇的 python 计算机过后，我又写了一个 TODO list<br>当然，还有很多地方要改进 XD</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># coding=utf-8</span></span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">A simple to do list power by python </span></span><br><span class="line"><span class="string">Using the wxpython gui framework to create the gui </span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">Variable name:</span></span><br><span class="line"><span class="string">Entry and display task area:</span></span><br><span class="line"><span class="string">- entry  # area user input</span></span><br><span class="line"><span class="string">- entry_var  # a variable that transform text from entry to task</span></span><br><span class="line"><span class="string">- task  # area to display all task</span></span><br><span class="line"><span class="string">- task_list  # a list to store all of the task</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">Button area:</span></span><br><span class="line"><span class="string">- b_add</span></span><br><span class="line"><span class="string">- b_delete</span></span><br><span class="line"><span class="string">- b_delte_all</span></span><br><span class="line"><span class="string">- b_exit</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> wx</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">to_do_list</span>(<span class="params">wx.Frame</span>):</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span>(<span class="params">self</span>):</span></span><br><span class="line">        super().__init__(<span class="literal">None</span>, title=<span class="string">&#x27;To Do List&#x27;</span>, size=(<span class="number">600</span>, <span class="number">300</span>))</span><br><span class="line">        self.init_ui()</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">init_ui</span>(<span class="params">self</span>):</span></span><br><span class="line">        <span class="comment"># Gui component</span></span><br><span class="line">        panel = wx.Panel(parent=self, size=(<span class="number">600</span>, <span class="number">300</span>))</span><br><span class="line">        </span><br><span class="line">        self.entry = wx.TextCtrl(parent=panel, style=wx.TE_RIGHT)</span><br><span class="line">        self.task = wx.TextCtrl(parent=panel, style=wx.TE_READONLY|wx.TE_MULTILINE)</span><br><span class="line">        </span><br><span class="line">        self.task_list = []</span><br><span class="line">        self.entry_var = <span class="string">&#x27;&#x27;</span></span><br><span class="line">        <span class="comment"># self.task.SetValue(self.task_list)</span></span><br><span class="line"></span><br><span class="line">        b_add = wx.Button(parent=panel, label=<span class="string">&#x27;Add&#x27;</span>, id=<span class="number">1</span>)</span><br><span class="line">        b_delete = wx.Button(parent=panel, label=<span class="string">&#x27;Delete&#x27;</span>, id=<span class="number">2</span>)</span><br><span class="line">        b_delte_all = wx.Button(parent=panel, label=<span class="string">&#x27;Delete all&#x27;</span>, id=<span class="number">3</span>)</span><br><span class="line">        <span class="comment"># b_exit = wx.Button(parent=panel, label=&#x27;Exit&#x27;, id=4)</span></span><br><span class="line">        </span><br><span class="line">        <span class="comment"># Main horizontal box sizer</span></span><br><span class="line">        hbox = wx.BoxSizer(wx.HORIZONTAL)</span><br><span class="line">        hbox.Add(self.entry, proportion=<span class="number">1</span>, border=<span class="number">1</span>)</span><br><span class="line">        hbox.Add(b_add, proportion=<span class="number">1</span>, border=<span class="number">1</span>)</span><br><span class="line">        hbox.Add(b_delete, proportion=<span class="number">1</span>, border=<span class="number">1</span>)</span><br><span class="line">        hbox.Add(b_delte_all, proportion=<span class="number">1</span>, border=<span class="number">1</span>)</span><br><span class="line">        <span class="comment"># hbox.Add(b_exit, proportion=1, border=1)</span></span><br><span class="line">        hbox.Add(self.task, proportion=<span class="number">1</span>, flag=wx.EXPAND,border=<span class="number">1</span>)</span><br><span class="line">        </span><br><span class="line">        self.Bind(wx.EVT_BUTTON, self.add_task, b_add)</span><br><span class="line">        self.Bind(wx.EVT_BUTTON, self.delete_task, b_delete)</span><br><span class="line">        self.Bind(wx.EVT_BUTTON, self.delete_all_task, b_delte_all)</span><br><span class="line"></span><br><span class="line">        panel.SetSizer(hbox)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># insert task at behind</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">add_task</span>(<span class="params">self, event</span>):</span></span><br><span class="line">        text = self.entry.GetValue()</span><br><span class="line">        self.entry.SetValue(<span class="string">&#x27;&#x27;</span>)</span><br><span class="line">        self.task_list.append(text)</span><br><span class="line">        self.task.SetValue(str(self.task_list))</span><br><span class="line"></span><br><span class="line">    <span class="comment"># Clear all task</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">delete_all_task</span>(<span class="params">self, event</span>):</span></span><br><span class="line">        <span class="keyword">try</span>:</span><br><span class="line">            self.task_list.clear()</span><br><span class="line">            self.task.SetValue(<span class="string">&#x27;All task clear O(∩_∩)O哈哈~&#x27;</span>)</span><br><span class="line">        <span class="keyword">except</span>:</span><br><span class="line">            print(<span class="string">&#x27;Nothing to clear !!!&#x27;</span>)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># Delete task from behind</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">delete_task</span>(<span class="params">self, event</span>):</span></span><br><span class="line">        <span class="keyword">try</span>:</span><br><span class="line">            <span class="keyword">del</span> self.task_list[<span class="number">-1</span>]</span><br><span class="line">            self.task.SetValue(str(self.task_list))</span><br><span class="line">            print(<span class="string">&quot;Congra !!! You&#x27;re done a task O(∩_∩)O哈哈~&quot;</span>)</span><br><span class="line">        <span class="keyword">except</span>:</span><br><span class="line">            print(<span class="string">&#x27;Nothing to clear !!!&#x27;</span>)</span><br><span class="line"></span><br><span class="line">app = wx.App()</span><br><span class="line">frame = to_do_list()</span><br><span class="line">frame.Show()</span><br><span class="line">app.MainLoop()</span><br></pre></td></tr></table></figure>

  $(function() {

    btn += '<i class="far fa-clone"></i>';
    btn += '</span>'; 
    // mount it!
    $(".highlight table").before(btn);
    var clip = new ClipboardJS('.btn-copy', {
      text: function(trigger) {
        return Array.from(trigger.nextElementSibling.querySelectorAll('.code')).reduce((str,it)=>str+it.innerText+'\n','')
      }
    });
    clip.on('success', function(e) {
      e.trigger.setAttribute('aria-label', "复制成功!");
      e.clearSelection();
    })
  })
