    <h1 id="壁球小游戏第六代"><a href="#壁球小游戏第六代" class="headerlink" title="壁球小游戏第六代"></a>壁球小游戏第六代</h1><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># Pygame Wall Ball Game Version 5</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">23/11/2020</span></span><br><span class="line"><span class="string">Pygame 日记 6</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">壁球小游戏（改变窗口图标版）</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">- pygame.display.set_caption(title, icontitle)  # icontitle 是用来设置窗口图标的</span></span><br><span class="line"><span class="string">- pygame.display.get_caption()  # 返回一组元组 （title, icontitle）</span></span><br><span class="line"><span class="string">- pygame.image.load(&#x27;example.png&#x27;)  # 加载图片</span></span><br><span class="line"><span class="string">- pygame.display.set_icon(surface)  # 设置图标</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> pygame, sys, os, time</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">locate_asset</span>(<span class="params">name</span>):</span></span><br><span class="line">    dir = os.path.dirname(__file__)</span><br><span class="line">    root = dir + <span class="string">&#x27;/&#x27;</span> + name</span><br><span class="line">    <span class="keyword">return</span> root</span><br><span class="line"></span><br><span class="line">image_root = locate_asset(<span class="string">&#x27;ball.gif&#x27;</span>)</span><br><span class="line">icon_root = locate_asset(<span class="string">&#x27;icon.png&#x27;</span>)</span><br><span class="line"></span><br><span class="line">pygame.init()</span><br><span class="line"></span><br><span class="line">vinfo = pygame.display.Info()</span><br><span class="line">size = width, height = <span class="number">600</span>, <span class="number">400</span></span><br><span class="line">speed = [<span class="number">1</span>, <span class="number">1</span>]  <span class="comment"># 速度，因为每次向下及向右移动一个像素</span></span><br><span class="line">BLACK = <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>  <span class="comment"># 背景颜色</span></span><br><span class="line"></span><br><span class="line">screen = pygame.display.set_mode(size, flags=pygame.RESIZABLE)</span><br><span class="line"><span class="comment"># 加载图标</span></span><br><span class="line">icon = pygame.image.load(icon_root)</span><br><span class="line">pygame.display.set_icon(icon)</span><br><span class="line">pygame.display.set_caption(<span class="string">&#x27;壁球小游戏的伸缩型&#x27;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># pygame 里每个物体都是一个 surface（同 jme 的 geometry）</span></span><br><span class="line">ball = pygame.image.load(image_root)  </span><br><span class="line"><span class="comment"># rect 呢就是 surface 对象的一个矩形方格（同 jme 的 BoxCollisionShape）碰撞体</span></span><br><span class="line">ball_rect = ball.get_rect()</span><br><span class="line"></span><br><span class="line">fps = <span class="number">10000</span> </span><br><span class="line">fps_clock = pygame.time.Clock()</span><br><span class="line"></span><br><span class="line"><span class="comment"># Main loop</span></span><br><span class="line"><span class="comment"># Handle event</span></span><br><span class="line"><span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">    <span class="comment"># Detect exit event</span></span><br><span class="line">    <span class="keyword">for</span> event <span class="keyword">in</span> pygame.event.get():</span><br><span class="line">        <span class="keyword">if</span> event.type == pygame.QUIT:</span><br><span class="line">            print(<span class="string">&#x27;\nGame quit ...&#x27;</span>)</span><br><span class="line">            sys.exit()</span><br><span class="line">        <span class="comment"># 相应键盘输入</span></span><br><span class="line">        <span class="keyword">elif</span> event.type == pygame.KEYDOWN:</span><br><span class="line">            <span class="keyword">if</span> event.key == pygame.K_LEFT:</span><br><span class="line">                speed[<span class="number">0</span>] = speed[<span class="number">0</span>] <span class="keyword">if</span> speed[<span class="number">0</span>] == <span class="number">0</span> <span class="keyword">else</span> (abs(speed[<span class="number">0</span>]) - <span class="number">1</span>) * int(speed[<span class="number">0</span>] / abs(speed[<span class="number">0</span>]))</span><br><span class="line">                print(<span class="string">&#x27;K_LEFT: &#x27;</span>, speed[<span class="number">0</span>])</span><br><span class="line">            <span class="keyword">elif</span> event.key == pygame.K_RIGHT:</span><br><span class="line">                speed[<span class="number">0</span>] = speed[<span class="number">0</span>] <span class="keyword">if</span> speed[<span class="number">0</span>] &gt; <span class="number">0</span> <span class="keyword">else</span> speed[<span class="number">0</span>] - <span class="number">1</span></span><br><span class="line">                print(<span class="string">&#x27;K_RIGHT: &#x27;</span>, speed[<span class="number">0</span>])</span><br><span class="line">            <span class="keyword">elif</span> event.key == pygame.K_UP:</span><br><span class="line">                speed[<span class="number">1</span>] = speed[<span class="number">1</span>] <span class="keyword">if</span> speed[<span class="number">1</span>] &gt; <span class="number">0</span> <span class="keyword">else</span> speed[<span class="number">1</span>] - <span class="number">1</span></span><br><span class="line">                print(<span class="string">&#x27;K_UP: &#x27;</span>, speed[<span class="number">1</span>])</span><br><span class="line">            <span class="keyword">elif</span> event.key == pygame.K_DOWN:</span><br><span class="line">                speed[<span class="number">1</span>] = speed[<span class="number">1</span>] <span class="keyword">if</span> speed[<span class="number">1</span>] == <span class="number">0</span> <span class="keyword">else</span> (abs(speed[<span class="number">1</span>]) - <span class="number">1</span>) * int(speed[<span class="number">1</span>] / abs(speed[<span class="number">1</span>]))</span><br><span class="line">                print(<span class="string">&#x27;K_DOWN: &#x27;</span>, speed[<span class="number">1</span>])</span><br><span class="line">            <span class="keyword">elif</span> event.key == pygame.K_ESCAPE:</span><br><span class="line">                print(<span class="string">&#x27;\nGame quit ...&#x27;</span>)</span><br><span class="line">                sys.exit()</span><br><span class="line">        <spa ;&#x27;</span></span><br><span class="line"><span class="keyword">import</span> pywhatkit</span><br><span class="line"><span class="keyword">import</span> pygame, sys, os, time</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">locate_asset</span>(<span class="params">name</span>):</span></span><br><span class="line">    dir = os.path.dirname(__file__)</span><br><span class="line">    root = dir + <span class="string">&#x27;/&#x27;</span> + name</span><br><span class="line">    <span class="keyword">return</span> root</span><br><span class="line"></span><br><span class="line">image_root = locate_asset(<span class="string">&#x27;ball.gif&#x27;</span>)</span><br><span class="line">icon_root = locate_asset(<span class="string">&#x27;icon.png&#x27;</span>)</span><br><span class="line"></span><br><span class="line">pygame.init()</span><br><span class="line"></span><br><span class="line">vinfo = pygame.display.Info()</span><br><span class="line">size = width, height = <span class="number">600</span>, <span class="number">400</span></span><br><span class="line">speed = [<span class="number">1</span>, <span class="number">1</span>]  <span class="comment"># 速度，因为每次向下及向右移动一个像素</span></span><br><span class="line">BLACK = <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>  <span class="comment"># 背景颜色</span></span><br><span class="line"></span><br><span class="line">screen = pygame.display.set_mode(size, flags=pygame.RESIZABLE)</span><br><span class="line"><span class="comment"># 加载图标</span></span><br><span class="line">icon = pygame.image.load(icon_root)</span><br><span class="line">pygame.display.set_icon(icon)</span><br><span class="line">pygame.display.set_caption(<span class="string">&#x27;壁球小游戏窗口感知和刷新设置版&#x27;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># pygame 里每个物体都是一个 surface（同 jme 的 geometry）</span></span><br><span class="line">ball = pygame.image.load(image_root)  </span><br><span class="line"><span class="comment"># rect 呢就是 surface 对象的一个矩形方格（同 jme 的 BoxCollisionShape）碰撞体</span></span><br><span class="line">ball_rect = ball.get_rect()</span><br><span class="line"></span><br><span class="line">fps = <span class="number">10000</span> </span><br><span class="line">fps_clock = pygame.time.Clock()</span><br><span class="line"></span><br><span class="line"><span class="comment"># Main loop</span></span><br><span class="line"><span class="comment"># Handle event</span></span><br><span class="line"><span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">    <span class="comment"># Detect exit event</span></span><br><span class="line">    <span class="keyword">for</span> event <span class="keyword">in</span> pygame.event.get():</span><br><span class="line">        <span class="keyword">if</span> event.type == pygame.QUIT:</span><br><span class="line">            print(<span class="string">&#x27;\nGame quit ...&#x27;</span>)</span><br><span class="line">            sys.exit()</span><br><span class="line">        <span class="comment"># 相应键盘输入</span></span><br><span class="line">        <span class="keyword">elif</span> event.type == pygame.KEYDOWN:</span><br><span class="line">            <span class="keyword">if</span> event.key == pygame.K_LEFT:</span><br><span class="line">                speed[<span class="number">0</span>] = speed[<span class="number">0</span>] <span class="keyword">if</span> speed[<span class="number">0</span>] == <span class="number">0</span> <span class="keyword">else</span> (abs(speed[<span class="number">0</span>]) - <span class="number">1</span>) * int(speed[<span class="number">0</span>] / abs(speed[<span class="number">0</span>]))</span><br><span class="line">                print(<span class="string">&#x27;K_LEFT: &#x27;</span>, speed[<span class="number">0</span>])</span><br><span class="line">            <span class="keyword">elif</span> event.key == pygame.K_RIGHT:</span><br><span class="line">                speed[<span class="number">0</span>] = speed[<span class="number">0</span>] <span class="keyword">if</span> speed[<span class="number">0</span>] &gt; <span class="number">0</span> <span class="keyword">else</span> speed[<span class="number">0</span>] - <span class="number">1</span></span><br><span class="line">                print(<span class="string">&#x27;K_RIGHT: &#x27;</span>, speed[<span class="number">0</span>])</span><br><span class="line">            <span class="keyword">elif</span> event.key == pygame.K_UP:</span><br><span class="line">                speed[<span class="number">1</span>] = speed[<span class="number">1</span>] <span class="keyword">if</span> speed[<span class="number">1</span>] &gt; <span class="number">0</span> <span class="keyword">else</span> speed[<span class="number">1</span>] - <span class="number">1</span></span><br><span class="line">                print(<span class="string">&#x27;K_UP: &#x27;</span>, speed[<span class="number">1</span>])</span><br><span class="line">            <span class="keyword">elif</span> event.key == pygame.K_DOWN:</span><br><span class="line">                speed[<span class="number">1</span>] = speed[<span class="number">1</span>] <span class="keyword">if</span> speed[<span class="number">1</span>] == <span class="number">0</span> <span class="keyword">else</span> (abs(speed[<span class="number">1</span>]) - <span class="number">1</span>) * int(speed[<span class="number">1</span>] / abs(speed[<span class="number">1</span>]))</span><br><span class="line">                print(<span class="string">&#x27;K_DOWN: &#x27;</span>, speed[<span class="number">1</span>])</span><br><span class="line">            <span class="keyword">elif</span> event.key == pygame.K_ESCAPE:</span><br><span class="line">                print(<span class="string">&#x27;\nGame quit ...&#x27;</span>)</span><br><span class="line">                sys.exit()</span><br><span class="line">        <span class="comment"># 响应 videoReset 事件</span></span><br><span class="line">        <span class="keyword">elif</span> event.type == pygame.VIDEORESIZE:</span><br><span class="line">            size = width, height = event.size[<span class="number">0</span>], event.size[<span class="number">1</span>]</span><br><span class="line">            print(size)</span><br><span class="line">            screen = pygame.display.set_mode(size, flags=pygame.RESIZABLE)</span><br><span class="line">            print(pygame.display.Info())</span><br><span class="line">    </span><br><span class="line">    <span class="comment"># 判断窗口是否还是被开启（活跃着）or 被最小化了</span></span><br><span class="line">    <span class="keyword">if</span> pygame.display.get_active():</span><br><span class="line">        ball_rect = ball_rect.move(speed[<span class="number">0</span>], speed[<span class="number">1</span>])  <span class="comment"># move the ball</span></span><br><span class="line">    </span><br><span class="line">    <span class="keyword">if</span> ball_rect.left &lt; <span class="number">0</span> <span class="keyword">or</span> ball_rect.right &gt; width:  <span class="comment"># if ball touching the left or right of window</span></span><br><span class="line">        speed[<span class="number">0</span>] = - speed[<span class="number">0</span>] </span><br><span class="line">    </span><br><span class="line">    <span class="keyword">if</span> ball_rect.top &lt; <span class="number">0</span> <span class="keyword">or</span> ball_rect.bottom &gt; height:</span><br><span class="line">        speed[<span class="number">1</span>] = - speed[<span class="number">1</span>]</span><br><span class="line"></span><br><span class="line">    screen.fill(BLACK)</span><br><span class="line">    <span class="comment"># 绘制壁球和壁球矩形</span></span><br><span class="line">    screen.blit(ball, ball_rect)</span><br><span class="line">    <span class="comment"># 也可以使用 flip 函数，但是 flip 时把窗口内所有的函数重新进行绘制</span></span><br><span class="line">    <span class="comment"># 而 update 则和 flip 相反，只针对某个游戏元素进行重新绘制</span></span><br><span class="line">    <span class="comment"># 所以 update 的执行速度比 flip 来的更快</span></span><br><span class="line">    pygame.display.update()  </span><br><span class="line">    fps_clock.tick(fps)</span><br></pre></td></tr></table></figure>
